<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>课后学习反馈</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-locked">
    <section class="auth-screen" id="authScreen" aria-labelledby="authTitle">
      <form class="auth-card" id="authForm">
        <p class="eyebrow">访问验证</p>
        <h1 id="authTitle">课后学习反馈</h1>
        <p class="lead">请输入访问密码后查看课堂反馈、作业安排和作业反馈。</p>
        <label>
          密码
          <input id="passwordInput" name="password" type="password" autocomplete="current-password" placeholder="请输入拼音密码" required />
        </label>
        <p class="auth-error" id="authError" role="alert"></p>
        <button class="primary" type="submit">进入反馈系统</button>
      </form>
    </section>

    <header class="topbar">
      <div>
        <p class="eyebrow">课后反馈系统</p>
        <h1>学生学习情况反馈</h1>
        <p class="lead">按日期记录每节课的大致学习内容、课堂练习、作业安排和作业反馈，学生与家长点开即可了解情况。</p>
      </div>
      <div class="summary">
        <span id="courseCount">0 节课</span>
        <span id="latestDate">暂无日期</span>
        <button class="ghost small-button" id="lockPage" type="button">退出</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel editor" aria-labelledby="editorTitle">
        <div class="section-head">
          <div>
            <p class="eyebrow">教师录入</p>
            <h2 id="editorTitle">新增 / 修改反馈</h2>
          </div>
          <button class="ghost" id="resetForm" type="button">清空</button>
        </div>

        <form id="lessonForm">
          <div class="field-row">
            <label>
              日期
              <input id="date" name="date" type="date" required />
            </label>
            <label>
              学生
              <input id="student" name="student" type="text" placeholder="例如：张同学" required />
            </label>
          </div>

          <label>
            课程次数
            <select id="lessonNo" name="lessonNo" required>
              <option value="第一课">第一课</option>
              <option value="第二课">第二课</option>
              <option value="第三课">第三课</option>
              <option value="第四课">第四课</option>
              <option value="第五课">第五课</option>
              <option value="第六课">第六课</option>
              <option value="第七课">第七课</option>
              <option value="第八课">第八课</option>
              <option value="第九课">第九课</option>
              <option value="第十课">第十课</option>
              <option value="第十一课">第十一课</option>
              <option value="第十二课">第十二课</option>
              <option value="第十三课">第十三课</option>
              <option value="第十四课">第十四课</option>
              <option value="第十五课">第十五课</option>
              <option value="第十六课">第十六课</option>
              <option value="第十七课">第十七课</option>
              <option value="第十八课">第十八课</option>
              <option value="第十九课">第十九课</option>
              <option value="第二十课">第二十课</option>
              <option value="第二十一课">第二十一课</option>
              <option value="第二十二课">第二十二课</option>
              <option value="第二十三课">第二十三课</option>
              <option value="第二十四课">第二十四课</option>
              <option value="第二十五课">第二十五课</option>
              <option value="第二十六课">第二十六课</option>
              <option value="第二十七课">第二十七课</option>
              <option value="第二十八课">第二十八课</option>
              <option value="第二十九课">第二十九课</option>
              <option value="第三十课">第三十课</option>
              <option value="第三十一课">第三十一课</option>
              <option value="第三十二课">第三十二课</option>
              <option value="第三十三课">第三十三课</option>
              <option value="第三十四课">第三十四课</option>
              <option value="第三十五课">第三十五课</option>
              <option value="第三十六课">第三十六课</option>
              <option value="第三十七课">第三十七课</option>
              <option value="第三十八课">第三十八课</option>
              <option value="第三十九课">第三十九课</option>
              <option value="第四十课">第四十课</option>
            </select>
          </label>

          <label>
            课程反馈：这节课学了什么
            <textarea id="content" name="content" rows="4" placeholder="逐条写清知识点、方法、易错点。每行一条，家长查看时会自动分点展示。" required></textarea>
          </label>

          <label>
            课堂完成：这节课做了什么
            <textarea id="questions" name="questions" rows="4" placeholder="例如：课本 P42 1-5；补充题 3 道；错题讲评第 2 题。" required></textarea>
          </label>

          <label>
            作业安排
            <textarea id="homework" name="homework" rows="3" placeholder="写明页码、题号、提交要求。" required></textarea>
          </label>

          <label>
            作业反馈
            <textarea id="homeworkFeedback" name="homeworkFeedback" rows="3" placeholder="例如：上次作业完成较认真；计算题错 2 道；需要订正第 4、6 题。" required></textarea>
          </label>

          <div class="field-row">
            <label>
              掌握情况
              <select id="status" name="status" required>
                <option value="掌握较好">掌握较好</option>
                <option value="基本掌握">基本掌握</option>
                <option value="需要巩固">需要巩固</option>
                <option value="需要重点跟进">需要重点跟进</option>
              </select>
            </label>
            <label>
              家长重点关注
              <select id="priority" name="priority" required>
                <option value="按时完成作业">按时完成作业</option>
                <option value="订正错题">订正错题</option>
                <option value="复习课堂笔记">复习课堂笔记</option>
                <option value="加强基础训练">加强基础训练</option>
              </select>
            </label>
          </div>

          <label>
            下次课跟进
            <textarea id="nextPlan" name="nextPlan" rows="3" placeholder="写明下次课要复习、检查或加强的内容。" required></textarea>
          </label>

          <button class="primary" type="submit">保存反馈</button>
        </form>
      </section>

      <section class="panel records" aria-labelledby="recordsTitle">
        <div class="section-head">
          <div>
            <p class="eyebrow">学生 / 家长查看</p>
            <h2 id="recordsTitle">按日期展开反馈</h2>
          </div>
          <div class="tools">
            <input id="search" type="search" placeholder="搜索学生、课次、题目、作业" />
            <button class="ghost" id="exportData" type="button">导出</button>
          </div>
        </div>

        <div class="timeline" id="timeline" aria-live="polite"></div>
      </section>
    </main>

    <template id="lessonTemplate">
      <article class="lesson">
        <button class="lesson-toggle" type="button">
          <span class="date"></span>
          <span class="lesson-no"></span>
          <span class="student"></span>
          <span class="badge"></span>
          <span class="chevron">⌄</span>
        </button>
        <div class="lesson-body">
          <div class="quick-summary">
            <div>
              <span>本节课次</span>
              <strong class="lessonLine"></strong>
            </div>
            <div>
              <span>家长关注</span>
              <strong class="priorityLine"></strong>
            </div>
          </div>

          <div class="grid">
            <section>
              <h3>课程反馈：这节课学了什么</h3>
              <ul class="content"></ul>
            </section>
            <section>
              <h3>课堂完成：这节课做了什么</h3>
              <ul class="questions"></ul>
            </section>
            <section>
              <h3>作业安排</h3>
              <ul class="homework"></ul>
            </section>
            <section>
              <h3>作业反馈</h3>
              <ul class="homeworkFeedback"></ul>
            </section>
            <section>
              <h3>下次课跟进</h3>
              <ul class="nextPlan"></ul>
            </section>
          </div>

          <div class="actions">
            <button class="primary view-report" type="button">查看给家长</button>
            <button class="ghost edit" type="button">编辑</button>
            <button class="danger delete" type="button">删除</button>
          </div>
        </div>
      </article>
    </template>

    <dialog id="familyDialog">
      <article class="family-report">
        <button class="close-dialog" id="closeDialog" type="button" aria-label="关闭">×</button>
        <p class="eyebrow">课后反馈</p>
        <h2 id="reportTitle">学生课后反馈</h2>
        <div class="report-meta" id="reportMeta"></div>
        <div class="report-status" id="reportStatus"></div>
        <div class="report-grid" id="reportGrid"></div>
        <div class="report-actions">
          <button class="ghost" id="printReport" type="button">打印 / 保存 PDF</button>
        </div>
      </article>
    </dialog>

    <script src="script.js"></script>
  </body>
</html>
